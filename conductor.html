<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ser Conductor - Muvicar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'primary': '#1E3A8A', 'secondary': '#F59E0B', 'surface': '#F8FAFC', 'on-surface-variant': '#64748B', 'outline': '#94A3B8', 'outline-variant': '#CBD5E1' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body class="bg-surface text-slate-800 font-sans">

    <!-- --- NAVBAR --- -->
    <header class="sticky top-0 z-40 w-full border-b border-outline-variant bg-white/80 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">local_shipping</span>
                <span class="text-xl font-black tracking-tight text-primary font-mono">MUVICAR</span>
            </div>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-on-surface-variant">
                <a href="index.html" class="hover:text-primary">Inicio</a>
                <a href="cotizar.html" class="hover:text-primary">Cotizar Viaje</a>
                <a href="conductor.html" class="text-secondary font-bold">Ser Conductor</a>
                <a href="beneficios.html" class="hover:text-primary">Beneficios</a>
                <a href="soporte.html" class="hover:text-primary">Soporte</a>
            </nav>
        </div>
    </header>

    <!-- --- SECCIÓN: REGISTRO --- -->
    <section class="py-16 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white border rounded-3xl p-8 shadow-xl grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
            <div class="lg:col-span-5 space-y-4">
                <h2 class="text-3xl font-extrabold text-slate-900">Incrementa tus ingresos manejando con nosotros</h2>
                <p class="text-sm text-on-surface-variant">Buscamos conductores con vehículos propios (turbos, camiones, camionetas de platón o vans) en Yopal.</p>
            </div>
            <div class="lg:col-span-7 bg-surface p-6 rounded-2xl border">
                <form action="https://formsubmit.co/mendivelsoalexandra782@gmail.com" method="POST" class="space-y-4">
                    <input type="hidden" name="_subject" value="🚛 ¡Nueva Postulación de Conductor - Muvicar!">
                    <input type="hidden" name="_captcha" value="false">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input required name="Conductor_Nombre" type="text" class="w-full rounded-xl border p-3 text-sm" placeholder="Nombre Completo *">
                        <input required name="Conductor_Telefono" type="tel" class="w-full rounded-xl border p-3 text-sm" placeholder="Celular / WhatsApp *">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input required name="Conductor_Placa" type="text" class="w-full rounded-xl border p-3 text-sm" placeholder="Placa *">
                    </div>
                    <button type="submit" class="w-full bg-primary text-white font-semibold py-3 rounded-xl hover:bg-slate-800">Enviar Postulación</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
