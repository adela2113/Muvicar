<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizar Viaje - Muvicar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'primary': '#1E3A8A', 'secondary': '#F59E0B', 'surface': '#F8FAFC', 'on-surface-variant': '#64748B', 'outline': '#94A3B8', 'outline-variant': '#CBD5E1' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body class="bg-surface text-slate-800 font-sans">

    <!-- --- NAVBAR --- -->
    <header class="sticky top-0 z-40 w-full border-b border-outline-variant bg-white/80 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">local_shipping</span>
                <span class="text-xl font-black tracking-tight text-primary font-mono">MUVICAR</span>
            </div>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-on-surface-variant">
                <a href="index.html" class="hover:text-primary">Inicio</a>
                <a href="cotizar.html" class="text-primary font-bold">Cotizar Viaje</a>
                <a href="conductor.html" class="hover:text-primary text-secondary font-semibold">Ser Conductor</a>
                <a href="beneficios.html" class="hover:text-primary">Beneficios</a>
                <a href="soporte.html" class="hover:text-primary">Soporte</a>
            </nav>
        </div>
    </header>

    <!-- --- SECCIÓN: COTIZADOR --- -->
    <section class="py-16 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
            <div class="lg:col-span-5 space-y-4">
                <h2 class="text-3xl font-extrabold tracking-tight text-slate-900">Cotizador Algorítmico e Instantáneo</h2>
                <p class="text-sm text-on-surface-variant leading-relaxed">Nuestra plataforma evalúa las variables de volumen, peso y distancias locales para entregarte una tarifa fija automatizada.</p>
            </div>

            <div class="lg:col-span-7 bg-white p-6 sm:p-8 rounded-3xl shadow-xl border border-outline-variant/40">
                <form id="form-logistica" action="https://formsubmit.co/mendivelsoalexandra782@gmail.com" method="POST" class="space-y-4">
                    <input type="hidden" name="_subject" value="🚚 ¡Nueva Solicitud de Servicio en Muvicar!">
                    <input type="hidden" name="_captcha" value="false"><input type="hidden" name="_template" value="table"> 

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-mono text-outline uppercase mb-1">Nombre Completo *</label>
                            <input required name="Cliente_Nombre" type="text" class="w-full rounded-xl border-outline-variant text-sm" placeholder="Ej. Juan Pérez">
                        </div>
                        <div>
                            <label class="block text-xs font-mono text-outline uppercase mb-1">Teléfono *</label>
                            <input required name="Cliente_Telefono" type="tel" class="w-full rounded-xl border-outline-variant text-sm" placeholder="Ej. 3001234567">
                        </div>
                    </div>
                    <div class="space-y-3">
                        <input required name="Direccion_Origen" type="text" class="w-full rounded-xl border-outline-variant text-sm p-3 border" placeholder="Dirección de Origen *">
                        <input required name="Direccion_Destino" type="text" class="w-full rounded-xl border-outline-variant text-sm p-3 border" placeholder="Dirección de Destino *">
                    </div>
                    <button type="submit" class="w-full bg-primary text-white font-semibold py-3.5 rounded-xl hover:bg-slate-800 transition-all shadow-lg">Confirmar Pedido</button>
                </form>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
